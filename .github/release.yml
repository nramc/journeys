changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 New Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: ⬆️ Dependency Updates
      labels:
        - dependencies
    - title: 🔧 Maintenance & Refactoring
      labels:
        - chore
        - refactor
        - ci
    - title: 📖 Documentation
      labels:
        - documentation

