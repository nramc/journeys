# Builds, tests, bumps version, creates a GitHub Release with auto-generated
# release notes (from merged PRs), and deploys to GitHub Pages.

name: CD Workflow

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 06:00 UTC
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write   # required to push tags and create releases

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npm run ci:build --if-present
      - run: npm run ci:lint --if-present
      - run: npm run ci:test --if-present

      - name: Bump Version & Tag
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6.4.0
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          skip-on-empty: 'false'
          output-file: false
          create-summary: true

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          generate_release_notes: true
          token: ${{ secrets.DEPLOY_TOKEN }}
          append_body: ${{ steps.changelog.outputs.summary }}

      - name: Deploy
        run: npm run ci:deploy
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
