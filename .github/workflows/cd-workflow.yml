# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CD Workflow


on:
  workflow_dispatch:
    inputs:
      gemini_model:
        description: 'Gemini model to use (e.g., gemini-3.1-flash-lite-preview, gemini-3-flash-preview, gemini-2.5-flash-lite, gemini-2.5-flash)'
        required: false
        default: ''


jobs:
  build:
    permissions:
      contents: write
      id-token: write

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 22.x ]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npm run ci:build --if-present
      - run: npm run ci:lint --if-present
      - run: npm run ci:test --if-present

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          skip-on-empty: 'false'
          output-file: true
          create-summary: true

      - name: 'Get Previous Tag'
        id: 'get_prev_tag'
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |-
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.changelog.outputs.tag }}^ 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: 'Generate Detailed Release Notes'
        id: 'gemini_release_notes'
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_RANGE: ${{ steps.get_prev_tag.outputs.tag }}..${{ steps.changelog.outputs.tag }}
          CLEAN_CHANGELOG: ${{ steps.changelog.outputs.clean_changelog }}
          RELEASE_NOTES_FILE: 'RELEASE_NOTES.md'
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: ${{ github.event.inputs.gemini_model != '' && github.event.inputs.gemini_model || vars.GEMINI_MODEL }}
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-release-notes'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "list_commits",
                    "list_pull_requests"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "write_file",
                  "run_shell_command(echo,cat)"
                ]
              }
            }
          prompt: '/gemini-release-notes'

      - name: Upload Release Notes Artifact
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

      - name: 'Read Release Notes'
        id: 'read_release_notes'
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        shell: bash
        run: |
          NOTES=""
          if [ -f RELEASE_NOTES.md ]; then
            NOTES="$(cat RELEASE_NOTES.md)"
          else
            NOTES="${{ steps.changelog.outputs.clean_changelog }}"
          fi
          delimiter="__RELEASE_NOTES_EOF__"
          echo "notes<<$delimiter" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "$delimiter" >> $GITHUB_OUTPUT

      - name: Create Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.read_release_notes.outputs.notes }}
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Deploy
        run: npm run ci:deploy
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
