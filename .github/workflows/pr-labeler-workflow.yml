name: PR Labeler Workflow

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

