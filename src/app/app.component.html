<div class="app-container h-screen flex flex-col">
  <app-toolbar (toggleNavigation)="toggleNavigation()" class="border-b-4 border-b-primary"></app-toolbar>

  <mat-sidenav-container class="grow h-full contents">
    <!-- Single sidenav: 'over' on mobile (toggled via navOpen), 'side' on desktop (always visible) -->
    <mat-sidenav [mode]="isMobile() ? 'over' : 'side'"
                 [opened]="isMobile() ? navOpen() : true"
                 [class.sidenav-collapsed]="!showNavLabel() && !isMobile()"
                 [class.sidenav-expanded]="showNavLabel()"
                 position="start">
      <app-navigation-menu [showLabel]="showNavLabel()"
                           (navigationLinkClick)="onNavigationLinkClick()"></app-navigation-menu>
    </mat-sidenav>

    <mat-sidenav-content class="max-sm:mt-3 grow p-4 mb-auto">
      <router-outlet class="contents"></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <app-loading-spinner></app-loading-spinner>
  <app-scroll-to-top></app-scroll-to-top>

</div>
