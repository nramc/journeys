<div #storyCard
     class="relative w-full max-w-sm mx-auto bg-black rounded-3xl overflow-hidden shadow-2xl"
     style="aspect-ratio: 9/16;">

  <!-- Full-bleed background image -->
  <div class="absolute inset-0 w-full h-full">
    <img [src]="journey.thumbnail"
         [alt]="journey.name"
         class="w-full h-full object-cover"/>

    <!-- Dark gradient overlay for text readability -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60"></div>
  </div>

  <!-- Top badge: Location and Category -->
  <div
    class="absolute top-4 left-4 flex items-center gap-2 bg-black/70 backdrop-blur-md rounded-full px-3 py-2 z-10">
    <span class="text-white text-xs font-medium">{{ journey.geoDetails?.city }}
      , {{ journey.geoDetails?.country }}</span>
    <mat-icon class="text-accent-primary text-sm">{{ journey.geoDetails?.category }}</mat-icon>
  </div>

  <!-- Map thumbnail in corner -->
  <div
    class="absolute top-4 right-4 w-16 h-16 rounded-lg overflow-hidden border-2 border-white/30 shadow-lg z-10">
    <img [src]="journey.thumbnail"
         alt="Map"
         class="w-full h-full object-cover"/>
  </div>

  <!-- Center: Journey title and date overlay -->
  <div class="absolute inset-0 flex flex-col items-center justify-center px-6 py-12 z-5">
    <h1 class="text-white text-3xl font-bold text-center text-balance drop-shadow-lg">
      {{ journey.name }}
    </h1>
    <p class="text-white/80 text-sm mt-3 drop-shadow-md">
      {{ journey.journeyDate }}
    </p>
  </div>

  <!-- Bottom section: Photo strip and tags -->
  <div
    class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 via-black/70 to-transparent pt-8 pb-4 px-4 z-10">

    <!-- Photo grid strip (3-5 photos) -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
      @for (image of journey.imagesDetails?.images; track image.assetId) {
        <img
          [src]="image.url"
          [alt]="image.title"
          class="w-16 h-16 rounded-lg object-cover flex-shrink-0 border border-white/20 shadow-md hover:border-accent-primary/50 transition"/>
      }

    </div>

    <!-- Hashtag pills -->
    <div class="flex flex-wrap gap-2 mb-4">
      @for (tag of journey.tags; track tag) {
        <span
          class="inline-block bg-white/10 hover:bg-accent-primary/20 text-white text-xs px-2 py-1 rounded-full backdrop-blur-sm border border-white/10 transition">
        {{ tag }}
      </span>
      }
    </div>

    <!-- Action buttons and watermark -->
    <div class="flex items-center justify-between">
      <div class="flex gap-2">
        <button mat-icon-button
                (click)="onDownload()"
                matTooltip="Download Story"
                class="text-white hover:bg-white/10 transition">
          <mat-icon>download</mat-icon>
        </button>
        <button mat-icon-button
                (click)="onShare()"
                matTooltip="Share Story"
                class="text-white hover:bg-white/10 transition">
          <mat-icon>share</mat-icon>
        </button>
      </div>

      <!-- Watermark -->
      <div class="text-white/70 text-xs font-medium flex items-center gap-1">
        <mat-icon class="text-xs">public</mat-icon>
        journeys.app
      </div>
    </div>
  </div>
</div>
