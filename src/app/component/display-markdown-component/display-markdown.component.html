<!-- ═══ Diary Page ═══════════════════════════════════════════════════════════ -->
<div class="diary-page">

  <!-- Leather binding spine -->
  <div class="diary-spine" aria-hidden="true"></div>

  <!-- Page content -->
  <div class="diary-content">

    <!-- ─── Header: date · title · TTS ─── -->
    <header class="diary-header">

      <!-- Entry date -->
      <div class="diary-meta">
        @if (formattedDate()) {
          <span class="diary-date">
            <mat-icon class="diary-date-icon">edit_calendar</mat-icon>
            {{ formattedDate() }}
          </span>
        }
      </div>

      <!-- Title row + narration controls -->
      <div class="diary-title-row">
        <h1 class="diary-title">{{ title() }}</h1>

        <div class="diary-tts">
          <!-- Open full diary book dialog -->
          <button type="button" mat-icon-button aria-label="Open full diary"
                  class="diary-open-btn" (click)="openDiaryBook()" [disabled]="!markdownText()">
            <mat-icon>menu_book</mat-icon>
          </button>

          <!-- Reusable narration player: English + Tamil TTS -->
          <app-narration-player [text]="cleanedText()" />
        </div>
      </div>

      <!-- Ink underline rule -->
      <div class="diary-title-rule"></div>

    </header>

    <!-- ─── Story body ─── -->
    <div class="diary-body">
      <markdown [data]="markdownText()" class="markdown-container"></markdown>
    </div>

  </div><!-- /diary-content -->
</div><!-- /diary-page -->
