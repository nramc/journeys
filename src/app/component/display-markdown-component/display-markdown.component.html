<!-- ═══ Diary Page ═══════════════════════════════════════════════════════════ -->
<div class="diary-page">

  <!-- Leather binding spine -->
  <div class="diary-spine" aria-hidden="true"></div>

  <!-- Page content -->
  <div class="diary-content">

    <!-- ─── Header: date · title · TTS ─── -->
    <header class="diary-header">

      <!-- Entry date -->
      <div class="diary-meta">
        @if (formattedDate()) {
          <span class="diary-date">
            <mat-icon class="diary-date-icon">edit_calendar</mat-icon>
            {{ formattedDate() }}
          </span>
        }
      </div>

      <!-- Title row + TTS controls -->
      <div class="diary-title-row">
        <h1 class="diary-title">{{ title() }}</h1>

        <div class="diary-tts">
          <!-- Open full book dialog -->
          <button type="button" mat-icon-button aria-label="Open full diary"
                  class="diary-open-btn" (click)="openDiaryBook()" [disabled]="!markdownText()">
            <mat-icon>menu_book</mat-icon>
          </button>

          <button type="button" mat-icon-button aria-label="Read aloud"
                  (click)="readContent()" [disabled]="isLoading() || isPlaying()">
            <mat-icon>volume_up</mat-icon>
          </button>
          @if (isPlaying()) {
            <span class="diary-tts-stop">
              <button type="button" mat-icon-button aria-label="Stop playback"
                      (click)="stopPlayback()">
                <mat-icon>stop_circle</mat-icon>
              </button>
            </span>
          }
          @if (isLoading()) {
            <mat-spinner diameter="20" class="!ml-1"
                         style="--mdc-circular-progress-active-indicator-color: #7a5c3e;"></mat-spinner>
          }
        </div>
      </div>

      <!-- Ink underline rule -->
      <div class="diary-title-rule"></div>

    </header>

    <!-- Error banner -->
    @if (error()) {
      <div class="diary-error">
        <mat-icon>error_outline</mat-icon>
        {{ error() }}
      </div>
    }

    <!-- ─── Story body ─── -->
    <div class="diary-body">
      <markdown [data]="markdownText()" class="markdown-container" #markdownComponent></markdown>
    </div>

  </div><!-- /diary-content -->
</div><!-- /diary-page -->
