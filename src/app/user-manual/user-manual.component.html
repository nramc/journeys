<app-page-header [pageInfo]="USER_MANUAL_PAGE_INFO"/>

<div class="flex flex-col container h-full text-pretty">
  <a class="skip-link" href="#manual-content">Skip to manual content</a>

  <main id="manual-content" class="mb-auto" tabindex="-1">

    <p class="manual-intro mb-6">
      Welcome to the <strong>Journey User Manual</strong>!
      This guide is designed to help you navigate and make the most of your experience with our platform.
    </p>

    <nav class="table-of-contents mb-8" aria-labelledby="contents-heading">
      <h2 id="contents-heading" class="text-lg font-bold mb-4">Explore the manual</h2>
      <nav>
        <ul class="contents-grid">
          @for (section of manualSections; track section.id) {
            <li>
              <a [href]="'#' + section.id" class="contents-link">{{ section.label }}</a>
            </li>
          }
        </ul>
      </nav>
    </nav>

    <app-manual-introduction id="introduction"/>

    <app-manual-getting-started id="getting-started"/>

    <app-manual-user-onboarding id="user-onboarding"/>

    <app-manual-account-recovery id="account-recovery"/>

    <app-manual-journey-manager id="journey-manager"/>

    <app-manual-dashboard id="dashboard"/>

    <app-manual-gallery id="gallery"/>

    <app-manual-statistics (thumbnailClicked)="showDialog($event)" id="statistics"/>

    <app-manual-my-account id="my-account"/>

    <app-manual-tools id="tools"/>

    <app-manual-daily-inspiration id="daily-inspiration"/>

  </main>

        <dialog #imageDialog id="imageDialog" aria-label="Image preview" tabindex="-1"
          (click)="$event.target === $event.currentTarget && closeDialog()" (keydown.escape)="closeDialog()">
    <div class="dialog-content">
                     <button type="button" class="dialog-close" aria-label="Close image preview" (click)="closeDialog()">
                            <span aria-hidden="true">&times;</span>
                     </button>
                    <img [src]="selectedImage()" alt="Expanded manual illustration" class="full-screen-image"/>
    </div>
  </dialog>

</div>
